    let currentIdx = 0;

    function initQuiz() {
        const select = document.getElementById('jump-select');
        quizData.forEach((_, i) => {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerText = "Lompat ke Soal " + (i + 1);
            select.appendChild(opt);
        });
        renderCard();
    }

    function renderCard() {
        document.getElementById('question-text').innerText = quizData[currentIdx].q;
        document.getElementById('answer-content').innerText = quizData[currentIdx].a;
        document.getElementById('jump-select').value = currentIdx;
        
        // Hide answer by default when moving to a new card
        document.getElementById('show-ans-btn').style.display = 'inline-block';
        document.getElementById('answer-section').style.display = 'none';
    }

    function toggleAnswer() {
        const answerSection = document.getElementById('answer-section');
        const showBtn = document.getElementById('show-ans-btn');
        
        if (answerSection.style.display === 'none' || answerSection.style.display === '') {
            answerSection.style.display = 'flex';
            showBtn.style.display = 'none';
        } else {
            answerSection.style.display = 'none';
            showBtn.style.display = 'inline-block';
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            renderCard();
        }
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            renderCard();
        }
    }

    function jumpTo(val) {
        currentIdx = parseInt(val);
        renderCard();
    }

                <div class="result-item">
                    <div class="result-q">${index + 1}. ${item.q}</div>
                    <div class="result-a">✓ ${item.a}</div>
                </div>
            `;
        });
    }

    function restart() {
        document.getElementById('results-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'block';
        currentIdx = 0;
        renderCard();
    }

    // Initialize application on page load
    window.onload = initQuiz;
</script>
</body>
</html>
